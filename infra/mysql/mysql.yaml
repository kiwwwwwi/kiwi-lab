apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: kiwi-lab
data:
  charset.cnf: |
    [mysqld]
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci
    init_connect='SET NAMES utf8mb4'

    [client]
    default-character-set=utf8mb4
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
  namespace: kiwi-lab
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS testdb;
    USE testdb;

    GRANT SELECT, RELOAD, SHOW DATABASES, REPLICATION SLAVE, REPLICATION CLIENT ON *.* TO 'debezium'@'%';
    FLUSH PRIVILEGES;

    CREATE TABLE IF NOT EXISTS orders (
      id          INT AUTO_INCREMENT PRIMARY KEY,
      customer    VARCHAR(100) NOT NULL,
      product     VARCHAR(100) NOT NULL,
      quantity    INT          NOT NULL DEFAULT 1,
      status      ENUM('pending', 'processing', 'shipped', 'cancelled') NOT NULL DEFAULT 'pending',
      created_at  TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at  TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
    );

    INSERT INTO orders (customer, product, quantity, status) VALUES
      ('alice', 'laptop', 1, 'pending'),
      ('bob',   'mouse',  2, 'shipped'),
      ('carol', 'keyboard', 1, 'processing');
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: kiwi-lab
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: kiwi-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0.41
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: rootpassword
            - name: MYSQL_DATABASE
              value: testdb
            - name: MYSQL_USER
              value: debezium
            - name: MYSQL_PASSWORD
              value: debezium
          args:
            - --server-id=1
            - --log-bin=mysql-bin
            - --binlog-format=ROW
            - --binlog-row-image=FULL
            - --expire_logs_days=1
            - --gtid-mode=ON
            - --enforce-gtid-consistency=ON
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-config
              mountPath: /etc/mysql/conf.d
            - name: mysql-init
              mountPath: /docker-entrypoint-initdb.d
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-config
          configMap:
            name: mysql-config
        - name: mysql-init
          configMap:
            name: mysql-init
        - name: mysql-data
          emptyDir: {}
