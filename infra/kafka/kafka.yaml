apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: combined
  namespace: kiwi-lab
  labels:
    strimzi.io/cluster: kafka
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: persistent-claim
    size: 10Gi
    deleteClaim: false
    # class: standard          # StorageClass 지정 (생략 시 기본값)
  resources:
    requests:
      memory: 2Gi
      cpu: "500m"
    limits:
      memory: 2Gi
      cpu: "1000m"
  # jvmOptions:
