apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka
  namespace: kiwi-lab
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.1.0
    metadataVersion: 4.1-IV0
    # image: ""                # 커스텀 이미지 사용 시 (기본값: Strimzi 공식 이미지)
    # brokerRackInitImage: ""  # rack 초기화 컨테이너 이미지
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
        # authentication:
        #   type: scram-sha-512  # tls, scram-sha-256, scram-sha-512, oauth
        # networkPolicyPeers: [] # 접근 허용할 네임스페이스/파드 셀렉터
        # configuration:
        #   maxConnections: 100
        #   maxConnectionCreationRate: 10
        #   useServiceDnsDomain: false
        #   publishNotReadyAddresses: false
        #   ipFamilies: []
        #   ipFamilyPolicy: ""
      # - name: tls
      #   port: 9093
      #   type: internal
      #   tls: true
      # - name: external
      #   port: 9094
      #   type: nodeport         # nodeport, loadbalancer, ingress, route, cluster-ip
      #   tls: false
      #   configuration:
      #     preferredNodePortAddressType: InternalDNS
      #     externalTrafficPolicy: Local
      #     loadBalancerSourceRanges: []
      #     allocateLoadBalancerNodePorts: true
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      auto.create.topics.enable: "true"
      group.initial.rebalance.delay.ms: 0
      # log.retention.hours: 168
      # log.segment.bytes: 1073741824
      # num.partitions: 1
      # message.max.bytes: 1048576
