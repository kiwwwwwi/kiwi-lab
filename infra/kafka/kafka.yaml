  #       value: ""
  # template:
  #   pod:
  #     metadata:
  #       labels: {}
  #       annotations: {}
  #     affinity: {}            # 파드 배치 규칙 (멀티 노드)
  #     tolerations: []         # 테인트 허용 (멀티 노드)
  #     topologySpreadConstraints: []  # 파드 분산 배치 (멀티 노드)
  #     priorityClassName: ""
  #     schedulerName: ""
  #     securityContext: {}
  #     terminationGracePeriodSeconds: 30
  #     imagePullSecrets: []
  #     enableServiceLinks: false
  #     hostAliases: []
  #     hostUsers: true
  #     tmpDirSizeLimit: 100Mi
  #     dnsPolicy: ClusterFirst
  #     dnsConfig: {}
  #     volumes: []             # 추가 볼륨 마운트
  #   kafkaContainer:
  #     env: []                 # 추가 환경 변수
  #     securityContext: {}
  #     volumeMounts: []
  #   initContainer:
  #     env: []
  #     securityContext: {}
  #     volumeMounts: []
  #   persistentVolumeClaim:
  #     metadata:
  #       labels: {}
  #       annotations: {}
  #   perPodService:
  #     metadata:
  #       labels: {}
  #       annotations: {}
  #   perPodRoute:              # OpenShift Route 사용 시
