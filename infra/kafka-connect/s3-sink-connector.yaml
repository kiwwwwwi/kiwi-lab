apiVersion: kafka.strimzi.io/v1
kind: KafkaConnector
metadata:
  name: s3-sink-test
  namespace: kiwi-lab
  labels:
    strimzi.io/cluster: s3-sink
spec:
  class: io.confluent.connect.s3.S3SinkConnector
  tasksMax: 1
  config:
    storage.class: "io.confluent.connect.s3.storage.S3Storage"
    behavior.on.null.values: "ignore"

    # MinIO 엔드포인트 (실제 AWS 사용 시 이 줄 제거)
    store.url: "http://minio:9000"
    s3.path.style.access.enabled: "true"
    s3.bucket.name: "kafka-s3-test"
    s3.region: "us-east-1"
    s3.part.size: "5242880"
    s3.compression.type: "gzip"

    aws.access.key.id: "${env:AWS_ACCESS_KEY_ID}"
    aws.secret.access.key: "${env:AWS_SECRET_ACCESS_KEY}"

    topics.regex: "debezium\\.mysql\\.shared\\.beauty_db\\..*"
    topics.dir: "cdc/cdc_mysql_shared"

    format.class: "io.confluent.connect.s3.format.json.JsonFormat"
    schema.compatibility: "NONE"
    schema.generator.class: "io.confluent.connect.storage.hive.schema.DefaultSchemaGenerator"
    schemas.enable: "false"

    partitioner.class: "io.confluent.connect.storage.partitioner.TimeBasedPartitioner"
    partition.duration.ms: "3600000"
    path.format: "'p_date'=YYYY-MM-dd-HH"
    rotate.schedule.interval.ms: "60000"

    # 로컬 테스트용 (프로덕션 참고값: 6000)
    flush.size: "10"
    timezone: "Asia/Seoul"
    locale: "ko_KR"

    key.converter: "org.apache.kafka.connect.storage.StringConverter"
    value.converter: "org.apache.kafka.connect.json.JsonConverter"
    value.converter.schemas.enable: "false"