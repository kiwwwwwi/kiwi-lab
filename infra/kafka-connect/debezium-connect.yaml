apiVersion: kafka.strimzi.io/v1
kind: KafkaConnect
metadata:
  name: debezium-mysql-local
  namespace: kiwi-lab
  annotations:
    strimzi.io/use-connector-resources: "true"
spec:
  version: 4.2.0
  replicas: 1
  image: debezium-connect:3.5.0-kafka-4.2.0-v3
  bootstrapServers: "kafka-kafka-bootstrap:9092"
  groupId: debezium-mysql-local
  configStorageTopic: __debezium-mysql-local-configs
  statusStorageTopic: __debezium-mysql-local-status
  offsetStorageTopic: __debezium-mysql-local-offsets
  template:
    connectContainer:
      env:
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: username
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: password
  config:
    offset.storage.replication.factor: 1
    config.storage.replication.factor: 1
    status.storage.replication.factor: 1
    key.converter: io.confluent.connect.avro.AvroConverter
    key.converter.schema.registry.url: http://schema-registry:8081
    value.converter: io.confluent.connect.avro.AvroConverter
    value.converter.schema.registry.url: http://schema-registry:8081
    config.providers: env
    config.providers.env.class: org.apache.kafka.common.config.provider.EnvVarConfigProvider
  resources:
    requests:
      memory: 4Gi
      cpu: "2000m"
    limits:
      memory: 4Gi
      cpu: "2000m"
  livenessProbe:
    initialDelaySeconds: 60
    timeoutSeconds: 5
  readinessProbe:
    initialDelaySeconds: 60
    timeoutSeconds: 5