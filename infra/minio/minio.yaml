apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: kiwi-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: minioadmin
            - name: MINIO_ROOT_PASSWORD
              value: minioadmin
          ports:
            - containerPort: 9000
              name: s3
            - containerPort: 9001
              name: console
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
# 클러스터 내부용 (kafka-connect → minio:9000)
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: kiwi-lab
spec:
  selector:
    app: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
# 로컬 브라우저 접근용 (localhost:30901 → MinIO Console)
apiVersion: v1
kind: Service
metadata:
  name: minio-nodeport
  namespace: kiwi-lab
spec:
  type: NodePort
  selector:
    app: minio
  ports:
    - name: console
      port: 9001
      targetPort: 9001
      nodePort: 30901
---
# 버킷 생성 Job
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: kiwi-lab
spec:
  template:
    spec:
      containers:
        - name: mc
          image: minio/mc:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              until mc alias set local http://minio:9000 minioadmin minioadmin; do
                echo "waiting for minio..."; sleep 2;
              done &&
              mc mb --ignore-existing local/kafka-s3-test &&
              echo "bucket kafka-s3-test ready"
      restartPolicy: OnFailure