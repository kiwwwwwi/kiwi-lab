replicaCount: 1

image:
  registry: ghcr.io
  repository: kafbat/kafka-ui
  pullPolicy: IfNotPresent
  tag: ""

# imagePullSecrets: []  # private registry 사용 시 필요
# nameOverride: ""
# fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

# existingConfigMap: ""  # 외부 ConfigMap으로 설정 주입 시 사용

yamlApplicationConfig:
  kafka:
    clusters:
      - name: local-cdc
        bootstrapServers: kafka-kafka-bootstrap:9092
        kafkaConnect:
          - name: local-connect
            address: http://debezium-mysql-shared-connect-api:8083
        schemaRegistry: http://schema-registry:8081

# yamlApplicationConfigConfigMap:  # ConfigMap에서 설정을 읽어올 때 사용
#   keyName: config.yml
#   name: configMapName

# yamlApplicationConfigSecret:  # Secret에서 설정을 읽어올 때 사용
#   keyName: config.yml
#   name: secretName

# existingSecret: ""  # 환경 변수를 외부 Secret으로 주입 시 사용

envs:
  secret: {}
  config: {}
  # secretMappings:  # 기존 Secret을 env로 매핑
  #   ENV_NAME:
  #     name: kubernetes-secret-name
  #     keyName: kubernetes-secret-key
  # configMappings:  # 기존 ConfigMap을 env로 매핑
  #   ENV_NAME:
  #     name: kubernetes-configmap-name
  #     keyName: kubernetes-configmap-key

env: {}

resources: {}
# resources:  # 프로덕션에서 설정 권장
#   limits:
#     cpu: 200m
#     memory: 512Mi
#   requests:
#     cpu: 200m
#     memory: 256Mi

# initContainers: {}  # 초기화 컨테이너 필요 시 사용
# volumeMounts: {}
# volumes: {}
# hostAliases: {}
# extraContainers: |  # 사이드카 컨테이너 (인증 프록시 등) 필요 시 사용

networkPolicy:
  enabled: false  # 네트워크 정책 필요 시 활성화
  # egressRules:
  #   customRules: []
  # ingressRules:
  #   customRules: []

podAnnotations: {}
podLabels: {}
annotations: {}
labels: {}

probes:
  useHttpsScheme: false
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 10
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 10
  startup:
    failureThreshold: 5
    periodSeconds: 40
    timeoutSeconds: 10

podSecurityContext:
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsGroup: 2000
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 80
  labels: {}
  # loadBalancerIP: ""  # LoadBalancer 타입 시 고정 IP 지정
  # nodePort:           # NodePort 타입 시 포트 지정

ingress:
  enabled: false  # 로컬에서는 port-forward 사용
  # annotations: {}
  # labels: {}
  # ingressClassName: ""
  # path: "/"
  # pathType: "Prefix"
  # host: ""
  # tls:
  #   enabled: false
  #   secretName: ""
  # precedingPaths: []
  # succeedingPaths: []

autoscaling:
  enabled: false  # 로컬 단일 레플리카 환경에서 불필요
  # minReplicas: 1
  # maxReplicas: 100
  # targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}       # 멀티 노드 환경에서 스케줄링 제어 시 사용
tolerations: []        # 테인트된 노드에 배포 시 사용
affinity: {}           # 파드 배치 규칙 (멀티 노드 HA) 필요 시 사용

revisionHistoryLimit: null
